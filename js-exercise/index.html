<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="container">
    <div id="screen" class="screen">0</div>
    <div class="row">
      <button type="button" class="btn"></button>
      <button type="button" class="btn"></button>
      <button type="button" id="clear" class="btn">AC</button>
      <button type="button" id="back" class="btn">DC</button>
    </div>
    <div class="row">
      <button type="button" id="7" class="btn">7</button>
      <button type="button" id="8" class="btn">8</button>
      <button type="button" id="9" class="btn">9</button>
      <button type="button" id="/" class="btn">/</button>
    </div>
    <div class="row">
      <button type="button" id="4" class="btn">4</button>
      <button type="button" id="5" class="btn">5</button>
      <button type="button" id="6" class="btn">6</button>
      <button type="button" id="x" class="btn">x</button>
    </div>
    <div class="row">
      <button type="button" id="1" class="btn">1</button>
      <button type="button" id="2" class="btn">2</button>
      <button type="button" id="3" class="btn">3</button>
      <button type="button" id="-" class="btn">-</button>
    </div>
    <div class="row">
      <button type="button" id="0" class="btn">0</button>
      <button type="button" id="." class="btn">.</button>
      <button type="button" id="=" class="btn">=</button>
      <button type="button" id="+" class="btn">+</button>
    </div>
  </div>
</body>

</html>
